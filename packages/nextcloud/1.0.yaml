image: nextcloud
description: Self-hosted productivity platform for file sync and collaboration
supplies: ["http", "storage"]
environment:
  SQLITE_DATABASE: nextcloud
  NEXTCLOUD_ADMIN_USER: "@adminuser@"
  NEXTCLOUD_ADMIN_PASSWORD: "@adminpass@"
  NEXTCLOUD_TRUSTED_DOMAINS: "@PACKAGE_DNS@"
network:
  internal:
    "@port@": "80"
volumes:
  html:
    mountpoint: /var/www/html
questions:
  adminuser:
    query: "What username should the Nextcloud admin account use?"
  adminpass:
    query: "What password should the Nextcloud admin account use?"
  port:
    query: "What external port should Nextcloud listen on?"
    type: port
    default: "80"
notes:
  URL:
    value: "http://@PACKAGE_DNS@:@port@"
    type: url
