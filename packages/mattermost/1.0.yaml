image: mattermost/mattermost-team-edition
description: Open-source messaging platform for team collaboration
supplies: ["http"]
environment:
  MM_SQLSETTINGS_DRIVERNAME: postgres
  MM_SQLSETTINGS_DATASOURCE: "postgres://mattermost:@dbpass@@127.0.0.1:5432/mattermost?sslmode=disable"
network:
  external:
    "@port@": "8065"
volumes:
  data:
    mountpoint: /mattermost/data
  logs:
    mountpoint: /mattermost/logs
  config:
    mountpoint: /mattermost/config
  plugins:
    mountpoint: /mattermost/plugins
  client-plugins:
    mountpoint: /mattermost/client/plugins
questions:
  port:
    query: "What external port should Mattermost listen on?"
    type: port
  dbpass:
    query: "Database password?"
    type: secret
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "mattermost"
      database: "mattermost"
      port: "5432"
templates:
  config:
    volume: config
    path: config.json
    content: |
      {
        "SqlSettings": {
          "DriverName": "postgres"
        }
      }
command: ["/mattermost/bin/mattermost", "server"]
