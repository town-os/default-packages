image: mattermost/mattermost-team-edition
description: Open-source messaging platform for team collaboration
supplies: ["http"]
environment:
  MM_SERVICESETTINGS_SITEURL: "https://@PACKAGE_DNS@:@port@"
  MM_SQLSETTINGS_DRIVERNAME: postgres
  MM_SQLSETTINGS_DATASOURCE: "postgres://mattermost:@dbpass@@@dep_db_host@:@dep_db_port_sql@/mattermost?sslmode=disable"
network:
  external:
    "@port@": "8065"
volumes:
  data:
    mountpoint: /mattermost/data
    uid: 2000
    gid: 2000
  logs:
    mountpoint: /mattermost/logs
    uid: 2000
    gid: 2000
  config:
    mountpoint: /mattermost/config
    uid: 2000
    gid: 2000
  plugins:
    mountpoint: /mattermost/plugins
    uid: 2000
    gid: 2000
  client-plugins:
    mountpoint: /mattermost/client/plugins
    uid: 2000
    gid: 2000
questions:
  port:
    query: "What external port should Mattermost listen on?"
    type: port
  dbpass:
    query: "Database password?"
    type: secret
    default: auto
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "mattermost"
      database: "mattermost"
      port: "5432"
templates:
  config:
    volume: config
    path: config.json
    content: |
      {
        "SqlSettings": {
          "DriverName": "postgres"
        }
      }
notes:
  URL:
    value: "https://@PACKAGE_DNS@:@port@"
    type: url
command: ["/mattermost/bin/mattermost", "server"]
