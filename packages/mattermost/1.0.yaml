image: mattermost/mattermost-team-edition
description: Open-source messaging platform for team collaboration
supplies: ["http"]
environment:
  MM_SQLSETTINGS_DRIVERNAME: postgres
  TOWNOS_DBPASS: "@dbpass@"
network:
  external:
    "@port@": "8065"
volumes:
  data:
    mountpoint: /mattermost/data
  logs:
    mountpoint: /mattermost/logs
  config:
    mountpoint: /mattermost/config
  plugins:
    mountpoint: /mattermost/plugins
  client-plugins:
    mountpoint: /mattermost/client/plugins
questions:
  port:
    query: "What external port should Mattermost listen on?"
    type: port
  dbpass:
    query: "Database password?"
    type: secret
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "mattermost"
      database: "mattermost"
      port: "auto"
templates:
  config:
    volume: config
    path: config.json
    content: |
      {
        "SqlSettings": {
          "DriverName": "postgres"
        }
      }
command: ["sh", "-c", "export MM_SQLSETTINGS_DATASOURCE=\"postgres://mattermost:${TOWNOS_DBPASS}@${TOWNOS_DEP_DB_HOST}:${TOWNOS_DEP_DB_PORT_5432}/mattermost?sslmode=disable\" && exec /mattermost/bin/mattermost server"]
