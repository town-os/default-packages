image: gitea/gitea
description: Lightweight self-hosted Git service
supplies: ["http"]
environment:
  GITEA__server__DOMAIN: "@PACKAGE_DNS@"
  GITEA__server__SSH_DOMAIN: "@PACKAGE_DNS@"
  GITEA__server__ROOT_URL: "https://@PACKAGE_DNS@:@httpport@/"
  GITEA__database__DB_TYPE: sqlite3
  GITEA__server__HTTP_PORT: "@httpport@"
  GITEA__server__SSH_PORT: "@sshport@"
  GITEA__server__SSH_LISTEN_PORT: "@sshport@"
network:
  internal:
    http: "@httpport@"
    ssh: "@sshport@"
volumes:
  data:
    mountpoint: /data
  log:
    mountpoint: /data/gitea/log
questions:
  httpport:
    query: "What port should the web interface listen on?"
    type: port
    default: "3000"
  sshport:
    query: "What port should SSH listen on?"
    type: port
    default: "2222"
post_update:
  - "gitea doctor check --fix"
notes:
  URL:
    value: "https://@PACKAGE_DNS@:@httpport@"
    type: url
  SSH:
    value: "ssh://git@@@PACKAGE_DNS@:@sshport@"
    type: url
