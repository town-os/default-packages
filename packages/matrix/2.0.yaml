image: matrixdotorg/synapse
description: Matrix homeserver for decentralized, secure messaging (local network)
supplies: ["http"]
entrypoint:
  - sh
  - -c
command:
  - >-
    python -m synapse.app.homeserver --config-path=/data/homeserver.yaml --generate-keys
    && exec python -m synapse.app.homeserver --config-path=/data/homeserver.yaml
environment:
  SYNAPSE_SERVER_NAME: "@PACKAGE_DNS@"
  SYNAPSE_REPORT_STATS: "no"
network:
  internal:
    # Naming this port "http" routes it to the shared :443 ingress, which
    # terminates TLS (DANE TLSA published in rolodex for matrix.<repo>.<tld>) and
    # reverse-proxies to synapse on its container port 8008 (x_forwarded is set
    # on the listener so synapse trusts the proxy). The client API is reached at
    # https://<dns>/ with no host port to choose.
    http: "8008"
  # To additionally serve a publicly-trusted (Let's Encrypt) certificate for an
  # internet-facing name, add the real FQDN here and point its public DNS at
  # this host; the ingress obtains an ACME cert for it:
  # domains:
  #   - matrix.example.com
volumes:
  data:
    mountpoint: /data
    uid: 991
    gid: 991
questions:
  dbpass:
    query: "Database password?"
    type: secret
    default: auto
  registration_secret:
    query: "Shared secret for user registration?"
    type: secret
    default: auto
  macaroon_secret:
    query: "Macaroon secret key?"
    type: secret
    default: auto
  form_secret:
    query: "Form secret?"
    type: secret
    default: auto
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "synapse"
      database: "synapse"
      port: "5432"
templates:
  data:
    volume: data
    path: homeserver.yaml
    content: |
      server_name: "@PACKAGE_DNS@"
      pid_file: /data/homeserver.pid
      listeners:
        - port: 8008
          tls: false
          type: http
          x_forwarded: true
          resources:
            - names: [client, federation]
              compress: false
      database:
        name: psycopg2
        args:
          user: synapse
          password: "@dbpass@"
          database: synapse
          host: "{{.Dep.db.Host}}"
          port: {{index .Dep.db.Ports "sql"}}
          cp_min: 5
          cp_max: 10
      log_config: "/data/log.config"
      media_store_path: /data/media_store
      registration_shared_secret: "@registration_secret@"
      macaroon_secret_key: "@macaroon_secret@"
      form_secret: "@form_secret@"
      report_stats: false
      signing_key_path: "/data/signing.key"
      trusted_key_servers:
        - server_name: "matrix.org"
  log:
    volume: data
    path: log.config
    content: |
      version: 1
      formatters:
        precise:
          format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
      handlers:
        console:
          class: logging.StreamHandler
          formatter: precise
      loggers:
        synapse.storage.SQL:
          level: WARNING
      root:
        level: WARNING
        handlers: [console]
      disable_existing_loggers: false
notes:
  URL:
    value: "https://@PACKAGE_DNS@/"
    type: url
  "Registration shared secret":
    value: "@registration_secret@"
