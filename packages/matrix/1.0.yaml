image: matrixdotorg/synapse
description: Matrix homeserver for decentralized, secure messaging
supplies: ["http"]
network:
  external:
    "@port@": "8008"
volumes:
  data:
    mountpoint: /data
questions:
  port:
    query: "What external port should Matrix listen on?"
    type: port
  servername:
    query: "Matrix server name (e.g. example.com)?"
  dbpass:
    query: "Database password?"
    type: secret
    default: auto
  registration_secret:
    query: "Shared secret for user registration?"
    type: secret
    default: auto
  macaroon_secret:
    query: "Macaroon secret key?"
    type: secret
    default: auto
  form_secret:
    query: "Form secret?"
    type: secret
    default: auto
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "synapse"
      database: "synapse"
      port: "5432"
templates:
  data:
    volume: data
    path: homeserver.yaml
    content: |
      server_name: "@servername@"
      pid_file: /data/homeserver.pid
      listeners:
        - port: 8008
          tls: false
          type: http
          x_forwarded: true
          resources:
            - names: [client, federation]
              compress: false
      database:
        name: psycopg2
        args:
          user: synapse
          password: "@dbpass@"
          database: synapse
          host: "@dep_db_host@"
          port: @dep_db_port_5432@
          cp_min: 5
          cp_max: 10
      log_config: "/data/log.config"
      media_store_path: /data/media_store
      registration_shared_secret: "@registration_secret@"
      macaroon_secret_key: "@macaroon_secret@"
      form_secret: "@form_secret@"
      report_stats: false
      signing_key_path: "/data/signing.key"
      trusted_key_servers:
        - server_name: "matrix.org"
  log:
    volume: data
    path: log.config
    content: |
      version: 1
      formatters:
        precise:
          format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
      handlers:
        console:
          class: logging.StreamHandler
          formatter: precise
      loggers:
        synapse.storage.SQL:
          level: WARNING
      root:
        level: WARNING
        handlers: [console]
      disable_existing_loggers: false
notes:
  URL:
    value: "http://@PACKAGE_DNS@:@port@"
    type: url
