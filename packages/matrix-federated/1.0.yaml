image: matrixdotorg/synapse
description: Federated Matrix homeserver with a configurable federation whitelist and UPnP-exposed ports
supplies: ["http"]
command:
  - sh
  - -c
  - >-
    python -m synapse.app.homeserver --config-path=/data/homeserver.yaml --generate-keys
    && exec python -m synapse.app.homeserver --config-path=/data/homeserver.yaml
environment:
  SYNAPSE_SERVER_NAME: "@PACKAGE_DNS@"
  SYNAPSE_REPORT_STATS: "no"
network:
  external:
    "@port@": "@port@"
volumes:
  data:
    mountpoint: /data
    uid: 991
    gid: 991
questions:
  port:
    query: "What port should Matrix listen on? (mapped via UPnP on the gateway)"
    type: port
    default: "8008"
  dbpass:
    query: "Database password?"
    type: secret
    default: auto
  registration_secret:
    query: "Shared secret for user registration?"
    type: secret
    default: auto
  macaroon_secret:
    query: "Macaroon secret key?"
    type: secret
    default: auto
  form_secret:
    query: "Form secret?"
    type: secret
    default: auto
  federation_whitelist:
    query: "Federation whitelist in YAML-list syntax (e.g. [example.com, matrix.org]). Use [] for an empty list (blocks all federation):"
    default: "[]"
dependencies:
  db:
    package: postgres
    responses:
      password: "@dbpass@"
      user: "synapse"
      database: "synapse"
templates:
  homeserver:
    volume: data
    path: homeserver.yaml
    content: |
      server_name: "@PACKAGE_DNS@"
      pid_file: /data/homeserver.pid
      listeners:
        - port: @port@
          tls: false
          type: http
          x_forwarded: true
          resources:
            - names: [client, federation]
              compress: false
      database:
        name: psycopg2
        args:
          user: synapse
          password: "@dbpass@"
          database: synapse
          host: "@dep_db_host@"
          port: @dep_db_port_sql@
          cp_min: 5
          cp_max: 10
      log_config: "/data/log.config"
      media_store_path: /data/media_store
      registration_shared_secret: "@registration_secret@"
      macaroon_secret_key: "@macaroon_secret@"
      form_secret: "@form_secret@"
      report_stats: false
      signing_key_path: "/data/signing.key"
      federation_domain_whitelist: @federation_whitelist@
      trusted_key_servers:
        - server_name: "matrix.org"
  log:
    volume: data
    path: log.config
    content: |
      version: 1
      formatters:
        precise:
          format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
      handlers:
        console:
          class: logging.StreamHandler
          formatter: precise
      loggers:
        synapse.storage.SQL:
          level: WARNING
      root:
        level: WARNING
        handlers: [console]
      disable_existing_loggers: false
notes:
  URL:
    value: "https://@PACKAGE_DNS@:@port@"
    type: url
  "Registration shared secret":
    value: "@registration_secret@"
  "Federation whitelist":
    value: "@federation_whitelist@"
