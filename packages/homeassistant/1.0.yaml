image: homeassistant/home-assistant
description: Open-source home automation platform
supplies: ["automation"]
network:
  internal:
    "@port@": "8123"
volumes:
  config:
    mountpoint: /config
questions:
  domain:
    query: "What domain should Home Assistant serve?"
    type: hostname
  port:
    query: "What port should the web interface listen on?"
    type: port
notes:
  URL:
    value: "http://@domain@:@port@"
    type: url
