image: homeassistant/home-assistant
description: Open-source home automation platform
supplies: ["automation"]
network:
  internal:
    "@port@": "8123"
volumes:
  config:
    mountpoint: /config
questions:
  port:
    query: "What port should the web interface listen on?"
    type: port
notes:
  URL:
    value: "http://@PACKAGE_DNS@:@port@"
    type: url
