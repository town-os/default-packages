image: spark
description: Unified analytics engine for large-scale data processing
network:
  external:
    "@webuiport@": "8080"
    "@masterport@": "7077"
volumes:
  work:
    mountpoint: /opt/spark/work-dir
questions:
  webuiport:
    query: "What external port should the Spark web UI listen on?"
    type: port
  masterport:
    query: "What external port should the Spark master listen on?"
    type: port
notes:
  UI:
    value: "http://@PACKAGE_DNS@:@webuiport@"
    type: url
  Master:
    value: "spark://@PACKAGE_DNS@:@masterport@"
    type: url
