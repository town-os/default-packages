image: plexinc/pms-docker
description: Media server for streaming movies, TV shows, and music
supplies: ["http"]
environment:
  PLEX_CLAIM: "@claim@"
  ADVERTISE_IP: "http://@PACKAGE_DNS@:@port@/"
network:
  internal:
    "@port@": "32400"
volumes:
  media:
    mountpoint: /data
    quota: "@mediasize@"
  config:
    mountpoint: /config
questions:
  port:
    query: "What port should Plex listen on?"
    type: port
  mediasize:
    query: "How much storage should be allocated for media?"
    type: bytes
  claim:
    query: "Plex claim token from https://plex.tv/claim (expires in 4 minutes)?"
notes:
  url:
    value: "http://@PACKAGE_DNS@:@port@/web"
    type: url
