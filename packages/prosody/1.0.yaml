image: jitsi/prosody:stable
description: XMPP server for Jitsi Meet
supplies: ["xmpp"]
environment:
  XMPP_DOMAIN: "meet.jitsi"
  XMPP_AUTH_DOMAIN: "auth.meet.jitsi"
  XMPP_MUC_DOMAIN: "muc.meet.jitsi"
  XMPP_INTERNAL_MUC_DOMAIN: "internal-muc.meet.jitsi"
  XMPP_GUEST_DOMAIN: "guest.meet.jitsi"
  JICOFO_AUTH_PASSWORD: "@jicofopass@"
  JVB_AUTH_PASSWORD: "@jvbpass@"
network:
  # The jitsi/prosody image hard-codes its c2s (XMPP client) listener to 5222 and
  # its BOSH/http-bind listener to 5280; neither can be moved by env. These ports
  # are therefore pinned literals, NOT `type: port` questions -- a port question
  # auto-generates a random port on an empty response (its `default` is only a UI
  # pre-fill, not a fallback), which would hand jicofo/jvb/web a port prosody
  # never listens on and break every conference with "connection refused". They
  # are `internal` because every consumer (jicofo, jvb, web) reaches prosody by
  # container name over the shared podman network; no host-side binding is needed.
  internal:
    xmpp: "5222"
    bosh: "5280"
volumes:
  config:
    mountpoint: /config
  prosody-plugins:
    mountpoint: /prosody-plugins-custom
questions:
  jicofopass:
    query: "Jicofo XMPP authentication password?"
    type: secret
    default: auto
  jvbpass:
    query: "JVB XMPP authentication password?"
    type: secret
    default: auto
