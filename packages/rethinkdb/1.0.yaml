image: rethinkdb
description: Open-source database for the realtime web
supplies: ["database"]
network:
  external:
    "@webport@": "8080"
    "@driverport@": "28015"
volumes:
  data:
    mountpoint: /data
questions:
  webport:
    query: "What external port should the RethinkDB admin console listen on?"
    type: port
  driverport:
    query: "What external port should the RethinkDB driver protocol listen on?"
    type: port
notes:
  Admin:
    value: "http://@PACKAGE_DNS@:@webport@"
    type: url
  Driver:
    value: "@PACKAGE_DNS@:@driverport@"
