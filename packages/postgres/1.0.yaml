image: postgres
description: Powerful open-source relational database
supplies: ["database"]
environment:
  POSTGRES_PASSWORD: "@password@"
  POSTGRES_USER: "@user@"
  POSTGRES_DB: "@database@"
network:
  external:
    "@port@": "5432"
volumes:
  data:
    mountpoint: /var/lib/postgresql
questions:
  password:
    query: "What should the PostgreSQL superuser password be?"
    type: secret
    default: auto
  user:
    query: "What should the PostgreSQL superuser name be? (default: postgres)"
  database:
    query: "What should the default database be named?"
  port:
    query: "What external port should PostgreSQL listen on?"
    type: port
post_update:
  - "su - postgres -c 'vacuumdb --all --analyze-in-stages'"
notes:
  Connection:
    value: "postgresql://@user@:@password@@@PACKAGE_DNS@:@port@/@database@"
    type: url
