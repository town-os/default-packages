image: ghcr.io/openclaw/openclaw
description: Personal AI assistant with multi-platform messaging support
supplies: ["ai"]
network:
  internal:
    "@port@": "18789"
volumes:
  config:
    mountpoint: /home/node/.openclaw
  workspace:
    mountpoint: /home/node/.openclaw/workspace
questions:
  domain:
    query: "What domain should OpenClaw serve?"
    type: hostname
  port:
    query: "What port should the web interface listen on?"
    type: port
notes:
  URL:
    value: "http://@domain@:@port@"
    type: url
