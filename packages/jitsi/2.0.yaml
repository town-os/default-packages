image: jitsi/web:stable
description: Open-source video conferencing platform (local network)
supplies: ["http"]
environment:
  ENABLE_HTTP_REDIRECT: "0"
  # The shared :443 ingress terminates TLS for jitsi.<repo>.<tld> and reverse-
  # proxies to the jitsi-web container, so PUBLIC_URL is https with no port.
  PUBLIC_URL: "https://@PACKAGE_DNS@/"
  XMPP_SERVER: "@dep_prosody_host@"
  XMPP_PORT: "@dep_prosody_port_xmpp@"
  # Base URL only (host:port, no path). The jitsi/web nginx template appends
  # /http-bind and /xmpp-websocket itself; including /http-bind here doubles the
  # prefix (proxy_pass .../http-bind/xmpp-websocket) and every conference fails
  # with a 404 on the XMPP websocket.
  XMPP_BOSH_URL_BASE: "http://@dep_prosody_host@:@dep_prosody_port_bosh@"
  XMPP_DOMAIN: "meet.jitsi"
  XMPP_AUTH_DOMAIN: "auth.meet.jitsi"
  XMPP_MUC_DOMAIN: "muc.meet.jitsi"
  XMPP_INTERNAL_MUC_DOMAIN: "internal-muc.meet.jitsi"
  XMPP_GUEST_DOMAIN: "guest.meet.jitsi"
network:
  internal:
    # Naming this port "http" routes it to the shared :443 ingress, which
    # terminates TLS (DANE TLSA published in rolodex for jitsi.<repo>.<tld>) and
    # reverse-proxies to jitsi-web on its default container port 80. There is no
    # host port to choose — the service is reached at https://<dns>/. The JVB
    # media UDP ports are owned by the jvb dependency and stay raw-forwarded.
    http: "80"
  # To additionally serve a publicly-trusted (Let's Encrypt) certificate for an
  # internet-facing name, add the real FQDN here and point its public DNS at
  # this host; the ingress obtains an ACME cert for it:
  # domains:
  #   - meet.example.com
volumes:
  config:
    mountpoint: /config
  crontabs:
    mountpoint: /var/spool/cron/crontabs
  transcripts:
    mountpoint: /usr/share/jitsi-meet/transcripts
questions:
  jicofopass:
    query: "Jicofo authentication password?"
    type: secret
    default: auto
  jvbpass:
    query: "JVB authentication password?"
    type: secret
    default: auto
dependencies:
  prosody:
    package: prosody
    responses:
      jicofopass: "@jicofopass@"
      jvbpass: "@jvbpass@"
  jicofo:
    package: jicofo
    responses:
      xmpphost: "@dep_prosody_host@"
      xmppport: "@dep_prosody_port_xmpp@"
      jicofopass: "@jicofopass@"
      port: "auto"
  jvb:
    package: jvb
    responses:
      xmpphost: "@dep_prosody_host@"
      xmppport: "@dep_prosody_port_xmpp@"
      jvbpass: "@jvbpass@"
      port: "auto"
      mediaport: "10000"
notes:
  URL:
    value: "https://@PACKAGE_DNS@/"
    type: url
