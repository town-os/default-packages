image: jitsi/web:stable
description: Open-source video conferencing platform
supplies: ["http"]
environment:
  ENABLE_HTTP_REDIRECT: "0"
  PUBLIC_URL: "https://@PACKAGE_DNS@:@port@"
  XMPP_SERVER: "@dep_prosody_host@"
  XMPP_PORT: "@dep_prosody_port_5222@"
  XMPP_BOSH_URL_BASE: "http://@dep_prosody_host@:@dep_prosody_port_5280@/http-bind"
  XMPP_DOMAIN: "meet.jitsi"
  XMPP_AUTH_DOMAIN: "auth.meet.jitsi"
  XMPP_MUC_DOMAIN: "muc.meet.jitsi"
  XMPP_INTERNAL_MUC_DOMAIN: "internal-muc.meet.jitsi"
  XMPP_GUEST_DOMAIN: "guest.meet.jitsi"
network:
  external:
    "@port@": "80"
volumes:
  config:
    mountpoint: /config
  crontabs:
    mountpoint: /var/spool/cron/crontabs
  transcripts:
    mountpoint: /usr/share/jitsi-meet/transcripts
questions:
  port:
    query: "What external port should Jitsi Meet listen on?"
    type: port
  jicofopass:
    query: "Jicofo authentication password?"
    type: secret
    default: auto
  jvbpass:
    query: "JVB authentication password?"
    type: secret
    default: auto
  xmppport:
    query: "Internal XMPP port?"
    type: port
  boshport:
    query: "Internal XMPP HTTP port?"
    type: port
dependencies:
  prosody:
    package: prosody
    responses:
      jicofopass: "@jicofopass@"
      jvbpass: "@jvbpass@"
      port: "@xmppport@"
      httpport: "@boshport@"
  jicofo:
    package: jicofo
    responses:
      xmpphost: "@dep_prosody_host@"
      xmppport: "@dep_prosody_port_5222@"
      jicofopass: "@jicofopass@"
      port: "auto"
  jvb:
    package: jvb
    responses:
      xmpphost: "@dep_prosody_host@"
      xmppport: "@dep_prosody_port_5222@"
      jvbpass: "@jvbpass@"
      port: "auto"
      mediaport: "10000"
notes:
  URL:
    value: "https://@PACKAGE_DNS@:@port@"
    type: url
